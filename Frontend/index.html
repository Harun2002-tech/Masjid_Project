<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/logo/logo.jpg" />
  
  <link rel="manifest" href="/manifest.json" />
  
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&family=Abyssinica+SIL&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruhama Islamic Center</title>

  <script src="https://apis.google.com/js/platform.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // service-worker.js ፋይል በ public ፎልደር ውስጥ መኖሩን አረጋግጥ
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker Registered! ✅'))
          .catch(err => console.log('Service Worker Registration Failed! ❌', err));
      });
    }
  </script>
</body>

</html>
